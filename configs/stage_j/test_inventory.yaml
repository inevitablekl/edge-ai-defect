classification_definitions:
  portable_required: >
    Existing M0-M5 test that does not depend on x86-specific behavior and is
    planned for x86 Release and Jetson Release.
  model_asset_required: >
    Test requiring a frozen ONNX, ModelContract, Level A/B/C asset, benchmark
    corpus, or another tracked model-related asset. Historical asset-backed
    tests may still be registered in Model Smoke OFF by the current CMake.
  x86_only: >
    Test requiring WSL/x86_64-specific SDK, tool, historical environment, or
    Python/PyTorch reference behavior and excluded from Jetson Release.
  jetson_only: >
    Test requiring Jetson, aarch64, nvpmodel, tegrastats, sysfs, MAXN_SUPER,
    or another Stage J device capability.
  sanitizer_required: >
    Model-independent portable C++ executable test suitable for both Jetson
    ASan and UBSan configurations.

stale_build_metadata:
  detected: true
  directories:
    - path: build/off
      observed_test_count: 24
